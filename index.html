<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Musical Instruments</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 1.5rem;
  }
  h1 {
    color: #fff;
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    margin-bottom: 0.4rem;
    letter-spacing: 1px;
    text-align: center;
  }
  p.subtitle {
    color: #a0b4c8;
    font-size: clamp(0.85rem, 3vw, 1rem);
    margin-bottom: 2rem;
    text-align: center;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: clamp(1rem, 3vw, 1.8rem);
    max-width: 600px;
    width: 100%;
  }
  .instrument {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: clamp(1.2rem, 4vw, 2rem) 1rem clamp(1rem, 3vw, 1.5rem);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
    user-select: none;
    position: relative;
    overflow: hidden;
    /* Larger touch target for fingers */
    min-height: clamp(140px, 30vw, 200px);
    justify-content: center;
    -webkit-touch-callout: none;
  }
  .instrument:active {
    transform: scale(0.94);
    background: rgba(255,255,255,0.15);
  }
  .instrument.playing {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(var(--accent-rgb), 0.3), 0 12px 40px rgba(0,0,0,0.4);
    background: rgba(var(--accent-rgb), 0.18);
  }
  .emoji {
    font-size: clamp(3rem, 10vw, 5rem);
    line-height: 1;
    margin-bottom: 0.75rem;
    transition: transform 0.15s;
  }
  .instrument.playing .emoji {
    animation: pulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { transform: scale(1.1) rotate(-5deg); }
    to   { transform: scale(1.22) rotate(5deg); }
  }
  .name {
    color: #fff;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .genre {
    color: #a0b4c8;
    font-size: clamp(0.65rem, 2vw, 0.8rem);
    margin-top: 0.3rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    text-align: center;
  }
  .hint {
    font-size: clamp(0.65rem, 2vw, 0.72rem);
    margin-top: 0.4rem;
    color: rgba(160,180,200,0.6);
    text-align: center;
  }
  .instrument.playing .hint {
    color: rgba(var(--accent-rgb), 0.9);
  }
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transform: scale(0);
    animation: ripple-anim 0.5s linear;
    pointer-events: none;
  }
  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }
  #now-playing {
    margin-top: 1.5rem;
    color: #a0b4c8;
    font-size: clamp(0.8rem, 2.5vw, 0.95rem);
    min-height: 1.4em;
    text-align: center;
    letter-spacing: 0.5px;
  }
  #now-playing span { color: #fff; font-weight: 600; }

  /* Add to home screen banner */
  #install-tip {
    margin-top: 1.2rem;
    color: rgba(160,180,200,0.5);
    font-size: 0.72rem;
    text-align: center;
    display: none;
  }

  .guitar { --accent: #f6c90e; --accent-rgb: 246,201,14; }
  .drums  { --accent: #e94560; --accent-rgb: 233,69,96; }
  .piano  { --accent: #00d4ff; --accent-rgb: 0,212,255; }
  .sax    { --accent: #f4a261; --accent-rgb: 244,162,97; }
</style>
</head>
<body>

<h1>🎵 Tap to Play</h1>
<p class="subtitle">Tap to play &bull; Tap again to stop</p>

<div class="grid">
  <div class="instrument guitar" ontouchend="handleTouch(event, this)" onclick="toggle(this)">

    <div class="name">Guitar</div>
    <div class="genre">Sweet &amp; Bright</div>
    <div class="hint">Tap to play</div>
  </div>
  <div class="instrument drums" ontouchend="handleTouch(event, this)" onclick="toggle(this)">
    <div class="emoji">🥁</div>
    <div class="name">Drums</div>
    <div class="genre">Latin Groove</div>
    <div class="hint">Tap to play</div>
  </div>
  <div class="instrument piano" ontouchend="handleTouch(event, this)" onclick="toggle(this)">
    <div class="emoji">🎹</div>
    <div class="name">Piano</div>
    <div class="genre">Wild West</div>
    <div class="hint">Tap to play</div>
  </div>
  <div class="instrument sax" ontouchend="handleTouch(event, this)" onclick="toggle(this)">
    <div class="emoji">🎷</div>
    <div class="name">Saxophone</div>
    <div class="genre">Cuban Son</div>
    <div class="hint">Tap to play</div>
  </div>
</div>

<div id="now-playing">Pick an instrument to start!</div>
<div id="install-tip">Tip: tap Share then "Add to Home Screen" to use as an app</div>

};

const names = {
  guitar: "Sugar Sweet Guitar",
  drums:  "Latin Danza Drumset",
  piano:  "Wild West Piano",
  sax:    "Cuban Son Saxophone",
};

// Pre-create Audio objects so iOS has them ready
const audioObjects = {};
Object.keys(audioData).forEach(key => {
  audioObjects[key] = new Audio(audioData[key]);
  audioObjects[key].preload = "auto";
});

let currentKey  = null;
let currentCard = null;

// Show install tip on iOS
if (/iphone|ipad|ipod/i.test(navigator.userAgent)) {
  document.getElementById("install-tip").style.display = "block";
}

function stop() {
  if (currentKey) {
    const audio = audioObjects[currentKey];
    audio.pause();
    audio.currentTime = 0;
  }
  if (currentCard) {
    currentCard.classList.remove("playing");
    currentCard.querySelector(".hint").textContent = "Tap to play";
  }
  currentKey  = null;
  currentCard = null;
  document.getElementById("now-playing").innerHTML = "Pick an instrument to start!";
}

function toggle(el) {
  // ripple
  const r = document.createElement("div");
  r.className = "ripple";
  r.style.cssText = "width:80px;height:80px;left:50%;top:50%;margin-left:-40px;margin-top:-40px;";
  el.appendChild(r);
  setTimeout(() => r.remove(), 600);

  const key = [...el.classList].find(c => audioObjects[c]);

  // same card tapped = stop
  if (currentCard === el) {
    stop();
    return;
  }

  // stop previous
  stop();

  // play — re-create Audio on iOS to avoid stale state
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (isIOS) {
    audioObjects[key] = new Audio(audioData[key]);
  }

  const audio = audioObjects[key];
  audio.currentTime = 0;

  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {
      // autoplay blocked — shouldn't happen on tap, but just in case
      document.getElementById("now-playing").innerHTML = "Tap the card to play!";
    });
  }

  el.classList.add("playing");
  el.querySelector(".hint").textContent = "Tap to stop";
  currentKey  = key;
  currentCard = el;

  document.getElementById("now-playing").innerHTML =
    "Now playing: <span>" + names[key] + "</span>";

  audio.onended = () => {
    if (currentCard === el) stop();
  };
}

// On iOS, ontouchend fires before onclick — prevent double-firing
let touchHandled = false;
function handleTouch(e, el) {
  e.preventDefault();
  touchHandled = true;
  toggle(el);
  setTimeout(() => touchHandled = false, 300);
}
</script>
